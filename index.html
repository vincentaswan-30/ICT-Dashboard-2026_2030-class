<!DOCTYPE html>
<html>
<head>
    <title>ICT Dashboard Login</title>

    <style>
        body {
            margin: 0;
            font-family: Arial;
            background: linear-gradient(to right, #1e3c72, #2a5298);
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
        }

        .login-box {
            background: white;
            padding: 30px;
            border-radius: 10px;
            width: 300px;
            text-align: center;
            box-shadow: 0px 0px 10px rgba(0,0,0,0.2);
        }

        input {
            width: 90%;
            padding: 10px;
            margin: 10px 0;
        }

        button {
            background: #1e3c72;
            color: white;
            border: none;
            padding: 10px;
            width: 100%;
            cursor: pointer;
        }

        button:hover {
            background: #2a5298;
        }
    </style>
</head>

<body>

    <div class="login-box">
        <h2>ICT Dashboard</h2>

        <input type="text" id="username" placeholder="Admission Number">
        <input type="password" id="password" placeholder="Password">

        <br>
        <input type="checkbox" onclick="togglePassword()"> Show Password

        <br><br>
        <button onclick="login()">Login</button>

        <p id="message" style="color:red;"></p>
    </div>

    <script>
        function togglePassword() {
            var pass = document.getElementById("password");

            if (pass.type === "password") {
                pass.type = "text";
            } else {
                pass.type = "password";
            }
        }

        function login() {
            var admission = document.getElementById("username").value;
            var pass = document.getElementById("password").value;

            if(admission !== "" && pass === "ICT@2026") {
                localStorage.setItem("student", admission);
                window.location.href = "dashboard.html";
            } else {
                document.getElementById("message").innerText = "Wrong password!";
            }
        }
    </script>

</body>
    </html>
