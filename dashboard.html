<!DOCTYPE html>
<html>
<head>
    <title>Dashboard</title>

    <style>
        body {
            margin: 0;
            font-family: Arial;
            background: #f4f4f4;
        }

        .header {
            background: #1e3c72;
            color: white;
            padding: 15px;
            text-align: center;
        }

        .container {
            padding: 20px;
            text-align: center;
        }

        .card {
            background: white;
            padding: 20px;
            margin: 20px auto;
            width: 300px;
            border-radius: 10px;
            box-shadow: 0px 0px 10px rgba(0,0,0,0.2);
        }

        button {
            background: red;
            color: white;
            border: none;
            padding: 10px;
            cursor: pointer;
        }
    </style>
</head>

<body>

    <div class="header">
        <h2>ICT Student Dashboard</h2>
    </div>

    <div class="container">

        <div class="card">
            <h3 id="studentName"></h3>
            <p>Welcome to your dashboard 🎉</p>
        </div>

        <button onclick="logout()">Logout</button>

    </div>

    <script>
        var student = localStorage.getItem("student");

        if(student === null) {
            window.location.href = "index.html";
        } else {
            document.getElementById("studentName").innerText = "Admission: " + student;
        }

        function logout() {
            localStorage.removeItem("student");
            window.location.href = "index.html";
        }
    </script>

</body>
    </html>
